<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Serkan & Dilara Wedding</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body, html {height: 100%; font-family: 'Jost', sans-serif; background-color: #fcfbfa; overflow: hidden; position: relative;}
        .click-layer {position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 8; cursor: pointer;}
        .background-image {position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('arka-plan.jpg'); background-size: cover; background-position: center; opacity: 0.85; z-index: 1;}
        .background-overlay {position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.15); z-index: 2;}
        
        /* SAĞ ÜSTTEKİ ŞEFFAF VE GÖLGESİZ YAZI ALANI */
        .wedding-card {position: fixed; top: 15px; right: 15px; z-index: 99; width: 55%; max-width: 240px; text-align: center; background: none; box-shadow: none; backdrop-filter: none; padding: 0;}
        .heart-icon {font-size: 1.2rem; color: #e24444; margin-bottom: 2px; animation: pulse 1.5s infinite; display: inline-block;}
        @keyframes pulse {0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); }}
        
        .names {font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 500; color: #ffffff; line-height: 1.2; margin-bottom: 1px; text-shadow: 1px 1px 3px rgba(0,0,0,0.4);}
        .wedding-text {font-family: 'Playfair Display', serif; font-size: 0.85rem; color: #ffffff; margin-bottom: 4px; font-weight: 400; text-shadow: 1px 1px 3px rgba(0,0,0,0.4);}
        .date {font-family: 'Playfair Display', serif; font-size: 0.72rem; font-weight: 400; color: #ffffff; border-top: 1px solid rgba(255,255,255,0.4); border-bottom: 1px solid rgba(255,255,255,0.4); padding: 2px 0; margin-bottom: 6px; text-shadow: 1px 1px 3px rgba(0,0,0,0.4);}
        
        .countdown-grid {display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; margin-bottom: 6px;}
        .countdown-box {background: rgba(255, 255, 255, 0.15); padding: 3px; border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.25); display: flex; flex-direction: column; align-items: center; backdrop-filter: blur(2px);}
        .countdown-number {font-family: 'Playfair Display', serif; font-size: 0.85rem; font-weight: 500; color: #ffffff;}
        .countdown-label {font-size: 0.38rem; text-transform: uppercase; color: #ffffff; font-weight: 300;}
        .bottom-message {font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.65rem; color: #ffffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.4);}
        
        /* İSTEDİĞİNİZ GİBİ: SOL ALTA GÖMÜLÜ MOBİL UYUMLU GOOGLE IFRAME HARİTA ALANI */
        .embedded-map-container {position: fixed; bottom: 12px; left: 12px; width: 140px; height: 110px; border-radius: 8px; overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.15); z-index: 99; border: 1px solid rgba(255,255,255,0.2);}
        .embedded-map-container iframe {width: 100% !important; height: 100% !important; border: 0;}
        
        /* İSTEDİĞİNİZ GİBİ: TAM SAĞ ALTA KUSURSUZCA GÖMÜLMÜŞ VİDEO */
        .bottom-right-video {position: fixed; bottom: 12px; right: 12px; width: 85px; height: 145px; border-radius: 8px; box-shadow: 0 6px 15px rgba(0,0,0,0.12); z-index: 4; opacity: 0.50; object-fit: cover;}
        
        .music-btn {position: fixed; top: 12px; left: 12px; z-index: 100; background: rgba(255, 255, 255, 0.9); border: 1px solid #e8e2e1; width: 30px; height: 30px; border-radius: 50%; font-size: 0.7rem; cursor: pointer; display: flex; justify-content: center; align-items: center;}
        
        @media (max-width: 330px) {
            .wedding-card { max-width: 170px; top: 10px; right: 10px; }
            .embedded-map-container { width: 115px; height: 95px; bottom: 10px; left: 10px; }
            .bottom-right-video { width: 75px; height: 125px; bottom: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <div class="click-layer" id="clickLayer" onclick="startMusic()"></div>
    <div class="background-image"></div>
    <div class="background-overlay"></div>
    <button class="music-btn" id="musicBtn" onclick="toggleMusic(event)">⏸️</button>
    <audio id="weddingMusic" loop prefetch="auto"><source src="muzik.mp3" type="audio/mp3"></audio>
    
    <!-- Sağ Üst Köşe Yazı Alanı -->
    <div class="wedding-card">
        <div class="heart-icon">❤️</div>
        <h1 class="names">Serkan & Dilara</h1>
        <div class="wedding-text">Wedding</div>
        <div class="date">26 Eylül 2026</div>
        <div class="countdown-grid">
            <div class="countdown-box"><span class="countdown-number" id="days">00</span><span class="countdown-label">Gün</span></div>
            <div class="countdown-box"><span class="countdown-number" id="hours">00</span><span class="countdown-label">Saat</span></div>
            <div class="countdown-box"><span class="countdown-number" id="minutes">00</span><span class="countdown-label">Dk</span></div>
            <div class="countdown-box"><span class="countdown-number" id="seconds">00</span><span class="countdown-label">Sn</span></div>
        </div>
        <div class="bottom-message">Sonsuz mutluluğa doğru geri sayım başladı...</div>
    </div>

    <!-- Sol Alt Köşeye Gömdüğümüz Canlı Çamlık Düğün Salonu Haritası -->
    <div class="embedded-map-container">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d276.10329674088274!2d27.12558363450652!3d38.47028291982371!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14bbd9d4d9d4c25f%3A0xad5a2a9d7d2d89a1!2zw4dhbWxpayBEw7zEn8O8biBTYWxvbnU!5e0!3m2!1sen!2str!4v1782586438412!5m2!1sen!2str" loading="lazy" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen=""></iframe>
    </div>

    <!-- Tam Sağ Alta Gömdüğümüz Video -->
    <video class="bottom-right-video" autoplay muted loop playsinline><source src="video.mp4" type="video/mp4"></video>

    <script>
        var myAudio = document.getElementById("weddingMusic"); var isPlaying = false;
        function startMusic() {
            if(!isPlaying) {
                myAudio.play().then(function() { isPlaying = true; document.getElementById("clickLayer").style.display = "none"; }).catch(function(e){});
            }
        }
        function toggleMusic(event) {
            if(event) event.stopPropagation();
            var btn = document.getElementById('musicBtn');
            if (!isPlaying) { myAudio.play(); btn.innerText = '⏸️'; isPlaying = true; document.getElementById("clickLayer").style.display = "none"; } 
            else { myAudio.pause(); btn.innerText = '🎵'; isPlaying = false; }
        }
        const weddingDate = new Date(2026, 8, 26, 0, 0, 0).getTime();
        setInterval(function() {
            const now = new Date().getTime(); const distance = weddingDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }, 1000);
    </script>
</body>
</html>
