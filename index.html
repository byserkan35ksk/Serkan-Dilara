<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serkan & Dilara Wedding</title>
    
    <!-- Şık Tasarım Fontları (Cinzel ve Jost) -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cinzel:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Jost', sans-serif;
            background-color: #fcfbfa;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Net Arka Plan Fotoğrafı */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('arka-plan.jpg'); 
            background-size: cover;
            background-position: center;
            opacity: 0.85; /* Fotoğraf artık tamamen net ve belirgin */
            z-index: 1;
        }

        /* Fotoğrafın üzerine yazıları okutacak hafif karartma perdesi */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.15);
            z-index: 2;
        }

        /* Örnek görseldeki gibi dikey beyaz davetiye kartı */
        .wedding-card {
            position: relative;
            z-index: 3;
            background: rgba(255, 255, 255, 0.93); /* Şeffaf beyaz zarif kart */
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* En üstteki Kalp Alanı */
        .heart-icon {
            font-size: 2.5rem;
            color: #e24444;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* İsimler Bölümü */
        .names {
            font-family: 'Cinzel', serif;
            font-size: 2.4rem;
            font-weight: 400;
            color: #4a3e3d;
            line-height: 1.3;
            margin-bottom: 10px;
        }

        .wedding-text {
            font-size: 1rem;
            letter-spacing: 6px;
            color: #8a7a78;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 400;
        }

        /* Tarih ve Saat */
        .date {
            font-size: 1.2rem;
            font-weight: 400;
            color: #5a4b4a;
            border-top: 1px solid #e0d9d8;
            border-bottom: 1px solid #e0d9d8;
            padding: 10px 0;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Görseldeki gibi 2x2 Kare Sayaç Kutuları */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 35px;
        }

        .countdown-box {
            background: #ffffff;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #f0eae9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .countdown-number {
            font-size: 1.8rem;
            font-weight: 400;
            color: #4a3e3d;
        }

        .countdown-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #9a8a88;
            margin-top: 4px;
        }

        /* Konum Butonu */
        .map-button {
            display: inline-block;
            font-family: 'Jost', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 14px 0;
            width: 100%;
            border-radius: 12px;
            background-color: #4a3e3d;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(74, 62, 61, 0.3);
        }

        .map-button:hover {
            background-color: #635352;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Net Arka Plan Görseli -->
    <div class="background-image"></div>
    <div class="background-overlay"></div>

    <!-- Dikey Davetiye Kartı -->
    <div class="wedding-card">
        <!-- Kalp Logosu -->
        <div class="heart-icon">❤️</div>

        <!-- Başlıklar -->
        <h1 class="names">Serkan & Dilara</h1>
        <div class="wedding-text">Wedding Day</div>
        
        <!-- Tarih -->
        <div class="date">26 Eylül 2026</div>

        <!-- 2x2 Geri Sayım Kutuları -->
        <div class="countdown-grid">
            <div class="countdown-box">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">Gün</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">Saat</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">Dakika</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">Saniye</span>
            </div>
        </div>

        <!-- Harita Konum Butonu -->
        <a href="https://goo.gl" target="_blank" class="map-button">
            Haritada Görüntüle
        </a>
    </div>

    <!-- Sayaç Scripti -->
    <script>
        const weddingDate = new Date(2026, 8, 26, 0, 0, 0).getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
            }
        }, 1000);
    </script>

</body>
</html>
