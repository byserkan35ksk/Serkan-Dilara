<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serkan & Dilara Wedding</title>
    
    <!-- Şık Klasik Yazı Fontları (Playfair Display ve Jost) -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Jost', sans-serif;
            background-color: #fcfbfa;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Net Arka Plan Fotoğrafı */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('arka-plan.jpg'); 
            background-size: cover;
            background-position: center;
            opacity: 0.85; 
            z-index: 1;
        }

        /* Fotoğrafın üzerine hafif karartma perdesi */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.15);
            z-index: 2;
        }

        /* Yatayda Geniş, Yüksekliği Az Zarif Davetiye Kartı */
        .wedding-card {
            position: relative;
            z-index: 3;
            background: rgba(255, 255, 255, 0.94); 
            width: 90%;
            max-width: 440px; 
            padding: 30px 35px; 
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.18);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* Büyük Kalp Alanı */
        .heart-icon {
            font-size: 3.2rem; 
            color: #e24444;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        /* İsimler Bölümü */
        .names {
            font-family: 'Playfair Display', serif;
            font-size: 2.3rem; 
            font-weight: 400;
            color: #615352;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        /* Wedding Alt Başlığı */
        .wedding-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #615352;
            margin-bottom: 15px;
            font-weight: 400;
        }

        /* Tarih */
        .date {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: #7d6e6d;
            border-top: 1px solid #e0d9d8;
            border-bottom: 1px solid #e0d9d8;
            padding: 8px 0;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        /* 2x2 Sayaç Izgarası */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .countdown-box {
            background: #ffffff;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #f0eae9;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .countdown-number {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem; 
            font-weight: 400;
            color: #4a3e3d;
        }

        .countdown-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9a8a88;
            margin-top: 2px;
        }

        /* Alt Kısımdaki İtalik Mesaj */
        .bottom-message {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.05rem;
            color: #7d6e6d;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        /* Güncellenen Yeni Harita Butonu */
        .map-button {
            display: inline-block;
            font-family: 'Jost', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 12px 0;
            width: 100%;
            border-radius: 8px;
            background-color: #4a3e3d;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(74, 62, 61, 0.2);
        }

        .map-button:hover {
            background-color: #635352;
            transform: translateY(-1px);
        }

        /* SAĞ ALTAKİ VİDEO */
        .bottom-right-video {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 180px; 
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 4;
            opacity: 0.50; 
            transition: opacity 0.3s ease;
        }

        @media (max-width: 600px) {
            .wedding-card {
                width: 92%;
                padding: 25px 20px;
            }
            .bottom-right-video {
                width: 110px; 
                bottom: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="background-image"></div>
    <div class="background-overlay"></div>

    <div class="wedding-card">
        <div class="heart-icon">❤️</div>

        <h1 class="names">Serkan & Dilara</h1>
        <div class="wedding-text">Wedding</div>
        
        <div class="date">26 Eylül 2026</div>

        <div class="countdown-grid">
            <div class="countdown-box">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">Gün</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">Saat</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">Dakika</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">Saniye</span>
            </div>
        </div>

        <div class="bottom-message">Sonsuz mutluluğa doğru geri sayım başladı...</div>

        <!-- Gönderdiğiniz yeni Google Haritalar linki sorunsuz yönlendirmeyle tanımlandı -->
        <a href="https://maps.app.goo.gl/LP8S9PvQXyPeUJno7" target="_blank" rel="noopener noreferrer" class="map-button">
            Haritada Görüntüle
        </a>
    </div>

    <video class="bottom-right-video" autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <script>
        const weddingDate = new Date(2026, 8, 26, 0, 0, 0).getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
            }
        }, 1000);
    </script>

</body>
</html>
