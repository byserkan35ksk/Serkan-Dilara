<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Serkan & Dilara Wedding</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body, html {height: 100%; font-family: 'Jost', sans-serif; background-color: #fcfbfa; display: flex; justify-content: flex-start; align-items: flex-end; overflow: hidden;}
        .click-layer {position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 8; cursor: pointer;}
        .background-image {position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('arka-plan.jpg'); background-size: cover; background-position: center; opacity: 0.85; z-index: 1;}
        .background-overlay {position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.18); z-index: 2;}
        
        /* İstediğiniz gibi: YÜKSEKLİĞİ AZ, ENİ DAHA GENİŞ SOL ALT KART */
        .wedding-card {position: relative; z-index: 99; background: rgba(255, 255, 255, 0.95); width: 70%; max-width: 310px; padding: 8px 12px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); text-align: center; backdrop-filter: blur(5px); margin-left: 12px; margin-bottom: 12px;}
        .heart-icon {font-size: 1.1rem; color: #e24444; margin-bottom: 1px; animation: pulse 1.5s infinite;}
        @keyframes pulse {0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); }}
        
        .names {font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 400; color: #4a3e3d; line-height: 1.1; margin-bottom: 1px;}
        .wedding-text {font-family: 'Playfair Display', serif; font-size: 0.8rem; color: #4a3e3d; margin-bottom: 3px; font-weight: 400;}
        .date {font-family: 'Playfair Display', serif; font-size: 0.68rem; font-weight: 400; color: #6e5d5c; border-top: 1px solid #e8e2e1; border-bottom: 1px solid #e8e2e1; padding: 1px 0; margin-bottom: 4px;}
        
        .countdown-grid {display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin-bottom: 4px;}
        .countdown-box {background: #ffffff; padding: 2px; border-radius: 3px; border: 1px solid #f2eded; display: flex; flex-direction: column; align-items: center;}
        .countdown-number {font-family: 'Playfair Display', serif; font-size: 0.8rem; font-weight: 400; color: #4a3e3d;}
        .countdown-label {font-size: 0.4rem; text-transform: uppercase; color: #9c8b8a;}
        .bottom-message {font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.62rem; color: #6e5d5c; margin-bottom: 4px;}
        
        /* Yenilenen Buton Metni Tasarımı */
        .map-button {display: inline-block; font-family: 'Jost', sans-serif; font-size: 0.58rem; font-weight: 500; color: #ffffff; text-decoration: none; text-transform: uppercase; letter-spacing: 0.5px; padding: 5px 0; width: 100%; border-radius: 4px; background-color: #4a3e3d; position: relative; z-index: 100;}
        
        .bottom-right-video {position: fixed; bottom: 12px; right: 12px; width: 75px; height: auto; border-radius: 6px; box-shadow: 0 6px 15px rgba(0,0,0,0.12); z-index: 4; opacity: 0.50;}
        .music-btn {position: fixed; top: 12px; left: 12px; z-index: 100; background: rgba(255, 255, 255, 0.9); border: 1px solid #e8e2e1; width: 30px; height: 30px; border-radius: 50%; font-size: 0.7rem; cursor: pointer; display: flex; justify-content: center; align-items: center;}
        
        @media (max-width: 320px) {
            .wedding-card { width: 68%; margin-left: 8px; margin-bottom: 8px; padding: 6px 10px; }
            .bottom-right-video { width: 65px; }
        }
    </style>
</head>
<body>
    <div class="click-layer" id="clickLayer" onclick="startMusic()"></div>
    <div class="background-image"></div>
    <div class="background-overlay"></div>
    <button class="music-btn" id="musicBtn" onclick="toggleMusic(event)">⏸️</button>
    <audio id="weddingMusic" loop prefetch="auto"><source src="muzik.mp3" type="audio/mp3"></audio>
    
    <div class="wedding-card">
        <div class="heart-icon">❤️</div>
        <h1 class="names">Serkan & Dilara</h1>
        <div class="wedding-text">Wedding</div>
        <div class="date">26 Eylül 2026</div>
        <div class="countdown-grid">
            <div class="countdown-box"><span class="countdown-number" id="days">00</span><span class="countdown-label">Gün</span></div>
            <div class="countdown-box"><span class="countdown-number" id="hours">00</span><span class="countdown-label">Saat</span></div>
            <div class="countdown-box"><span class="countdown-number" id="minutes">00</span><span class="countdown-label">Dk</span></div>
            <div class="countdown-box"><span class="countdown-number" id="seconds">00</span><span class="countdown-label">Sn</span></div>
        </div>
        <div class="bottom-message">Sonsuz mutluluğa doğru geri sayım başladı...</div>
        
        <!-- Kesin Olarak Uygulamayı ve Doğru Konumu Tetikleyen Evrensel Harita Linki -->
        <a href="https://google.com" target="_blank" rel="noopener noreferrer" class="map-button">Düğün Salonumuzun Konumu</a>
    </div>

    <video class="bottom-right-video" autoplay muted loop playsinline><source src="video.mp4" type="video/mp4"></video>

    <script>
        var myAudio = document.getElementById("weddingMusic"); var isPlaying = false;
        function startMusic() {
            if(!isPlaying) {
                myAudio.play().then(function() { isPlaying = true; document.getElementById("clickLayer").style.display = "none"; }).catch(function(e){});
            }
        }
        function toggleMusic(event) {
            if(event) event.stopPropagation();
            var btn = document.getElementById('musicBtn');
            if (!isPlaying) { myAudio.play(); btn.innerText = '⏸️'; isPlaying = true; document.getElementById("clickLayer").style.display = "none"; } 
            else { myAudio.pause(); btn.innerText = '🎵'; isPlaying = false; }
        }
        const weddingDate = new Date(2026, 8, 26, 0, 0, 0).getTime();
        setInterval(function() {
            const now = new Date().getTime(); const distance = weddingDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }, 1000);
    </script>
</body>
</html>
