<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serkan & Dilara Wedding</title>
    
    <!-- Şık Klasik Yazı Fontları (Playfair Display ve Jost) -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Jost', sans-serif;
            background-color: #fcfbfa;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Net Arka Plan Fotoğrafı */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('arka-plan.jpg'); 
            background-size: cover;
            background-position: center;
            opacity: 0.85; 
            z-index: 1;
        }

        /* Fotoğrafın üzerine hafif karartma perdesi */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.18);
            z-index: 2;
        }

        /* İlk Giriş Ekranı Perdesi */
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fcfbfa;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .welcome-btn {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: #ffffff;
            background-color: #4a3e3d;
            border: none;
            padding: 14px 30px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(74, 62, 61, 0.2);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .welcome-btn:hover {
            background-color: #635352;
            transform: translateY(-2px);
        }

        /* İstediğiniz gibi: BOYUTLARI KÜÇÜLTÜLMÜŞ, DAHA KİBAR Davetiye Kartı */
        .wedding-card {
            position: relative;
            z-index: 3;
            background: rgba(255, 255, 255, 0.95); 
            width: 88%;
            max-width: 390px; /* Genişliği ve yüksekliği dengelemek için ideal boyuta çektik */
            padding: 25px 25px; /* İç boşlukları daralttık */
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            text-align: center;
            backdrop-filter: blur(5px);
            opacity: 0;
            transform: scale(0.96);
            transition: all 0.6s ease;
        }

        .wedding-card.show {
            opacity: 1;
            transform: scale(1);
        }

        /* Küçültülmüş Kalp */
        .heart-icon {
            font-size: 2.2rem; 
            color: #e24444;
            margin-bottom: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        /* İsimler Bölümü (Daha Kibar ve Küçük) */
        .names {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem; /* Yazıyı küçülttük */
            font-weight: 400;
            color: #4a3e3d;
            line-height: 1.2;
            margin-bottom: 2px;
        }

        /* Wedding Alt Başlığı */
        .wedding-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem; /* Küçültüldü */
            color: #4a3e3d;
            margin-bottom: 12px;
            font-weight: 400;
        }

        /* Tarih */
        .date {
            font-family: 'Playfair Display', serif;
            font-size: 0.95rem; /* Küçültüldü */
            font-weight: 400;
            color: #6e5d5c;
            border-top: 1px solid #e8e2e1;
            border-bottom: 1px solid #e8e2e1;
            padding: 6px 0;
            letter-spacing: 0.5px;
            margin-bottom: 18px;
        }

        /* 2x2 Sayaç Izgarası */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }

        .countdown-box {
            background: #ffffff;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #f2eded;
            box-shadow: 0 1px 4px rgba(0,0,0,0.01);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .countdown-number {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem; /* Sayılar küçültüldü */
            font-weight: 400;
            color: #4a3e3d;
        }

        .countdown-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9c8b8a;
            margin-top: 1px;
        }

        /* Alt Kısımdaki İtalik Mesaj */
        .bottom-message {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.95rem; /* Küçültüldü */
            color: #6e5d5c;
            margin-bottom: 18px;
        }

        /* Harita Butonu */
        .map-button {
            display: inline-block;
            font-family: 'Jost', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 11px 0;
            width: 100%;
            border-radius: 6px;
            background-color: #4a3e3d;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(74, 62, 61, 0.15);
        }

        .map-button:hover {
            background-color: #635352;
            transform: translateY(-1px);
        }

        /* SAĞ ALTAKİ VİDEO */
        .bottom-right-video {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 140px; /* Video boyutu daha dengeli hale getirildi */
            height: auto;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            z-index: 4;
            opacity: 0.50; 
        }

        /* SOL ÜSTTEKİ MÜZİK KONTROL BUTONU */
        .music-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 5;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #e8e2e1;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            opacity: 0;
            visibility: hidden;
        }

        .music-btn.show {
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 600px) {
            .wedding-card {
                width: 90%;
                padding: 20px 20px;
            }
            .names { font-size: 1.7rem; }
            .wedding-text { font-size: 1.3rem; }
            .bottom-right-video { width: 100px; }
        }
    </style>
</head>
<body>
    <!-- Arka Plan Görselleri -->
    <div class="background-image"></div>
    <div class="background-overlay"></div>

    <!-- Giriş Ekranı Perdesi (Müziğin kesin olarak çalması için gereklidir) -->
    <div class="welcome-overlay" id="welcomeOverlay">
        <button class="welcome-btn" onclick="initWedding()">Davetiyeyi Aç & Müziği Başlat 🎵</button>
    </div>

    <!-- Sol Üst Müzik Durdurma Butonu -->
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">⏸️</button>

    <!-- Doğrudan Tarayıcıdan Çalacak Güvenli Ses Dosyası -->
    <audio id="weddingMusic" loop>
        <source src="https://mixkit.co" type="audio/wav"> <!-- Yedek ses tetikleyici -->
        <source src="https://soundhelix.com" type="audio/mp3"> 
    </audio>

    <!-- Küçültülmüş ve Zarif Davetiye Kartı -->
    <div class="wedding-card" id="weddingCard">
        <div class="heart-icon">❤️</div>

        <h1 class="names">Serkan & Dilara</h1>
        <div class="wedding-text">Wedding</div>
        
        <div class="date">26 Eylül 2026</div>

        <div class="countdown-grid">
            <div class="countdown-box">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">Gün</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">Saat</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">Dakika</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">Saniye</span>
            </div>
        </div>

        <div class="bottom-message">Sonsuz mutluluğa doğru geri sayım başladı...</div>

        <!-- Tarayıcı / Uygulama Korumalarını Aşan Güvenli Küresel Google Haritalar Bağlantısı -->
        <a href="https://google.com" target="_blank" rel="noopener noreferrer" class="map-button">
            Haritada Görüntüle
        </a>
    </div>

    <!-- Sağ Alttaki Video -->
    <video class="bottom-right-video" autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <script>
        var myAudio = document.getElementById("weddingMusic");
        var isPlaying = false;

        // Özel Durum: Bruno Mars Şarkısını İnternet Üzerinden Güvenli CDN ile Çekiyoruz
        myAudio.src = "https://archive.org";

        // Davetiyeyi Açan ve Müziği Kesin Olarak Başlatan Fonksiyon
        function initWedding() {
            var overlay = document.getElementById('welcomeOverlay');
            overlay.style.opacity = '0';
            overlay.style.visibility = 'hidden';

            document.getElementById('weddingCard').classList.add('show');
            document.getElementById('musicBtn').classList.add('show');

            // Doğrudan ses dosyasını oynatma komutu
            myAudio.play().then(function() {
                isPlaying = true;
            }).catch(function(error) {
                console.log("Müzik otomatik başlatılamadı, kullanıcı etkileşimi bekleniyor.");
            });
        }

        // Müzik Açma / Kapatma Yönetimi
        function toggleMusic() {
            var btn = document.getElementById('musicBtn');
            if (!isPlaying) {
                myAudio.play();
                btn.innerText = '⏸️';
                isPlaying = true;
            } else {
                myAudio.pause();
                btn.innerText = '🎵';
                isPlaying = false;
            }
        }

        // Canlı Sayaç Scripti
        const weddingDate = new Date(2026, 8, 26, 0, 0, 0).getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
            }
        }, 1000);
    </script>

</body>
</html>
